name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build and release (e.g. v0.4.26)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Resolve version
        id: ver
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build binaries for all platforms
        run: make binaries TARGET_VERSION=${{ steps.ver.outputs.version }}

      - name: Generate checksums
        run: sha256sum plasmactl_* > checksums.txt

      - name: List artifacts
        run: ls -lah plasmactl_* checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            plasmactl_* checksums.txt \
            --title "${{ steps.ver.outputs.version }}" \
            --generate-notes
